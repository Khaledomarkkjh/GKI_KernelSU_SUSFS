name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'
inputs:
  bypass:
    description: 'Whether to add the bypass hack or not'
    required: true
  version:
    description: 'Kernel config version (e.g., android14-6.1)'
    required: true

runs:
  using: composite
  steps:
  - name: 'Activate Bypass'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ "${{ inputs.bypass }}" = "true" ]; then
        if [[ ${{ inputs.version }} == "android14-6.1" || ${{ inputs.version }} == "android15-6.6" || ${{ inputs.version }} == "android16-6.12" ]]; then
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module/version.c"
        else
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module.c"
        fi

        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

        if ! grep -A 5 "bad_version:" "$TARGET_FILE" | grep -q "return 1;"; then
          echo "Patch failed! 'return 1;' not found at bad_version:"
          grep -A 10 "bad_version:" "$TARGET_FILE" || true
          exit 1
        fi
      else
        echo "Bypass hack not applied as per input parameter."
      fi

  - name: Setup Kernel Configs
    if: false
    uses: ./.github/actions/set-kernel-config
  
  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -uxo pipefail
      cat common/arch/arm64/configs/gki_defconfig
      sed -i 's/check_defconfig//' ./common/build.config.gki
      if [ -f "build/build.sh" ]; then
        BUILD_GKI_ARTIFACTS= \
        BUILD_GKI_CERTIFICATION_TOOLS=0 \
        BUILD_SYSTEM_DLKM=0 \
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        OUT_DIR="/home/runner/out" \
        LTO=thin \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="/usr/bin/ccache clang" \
        CXX="/usr/bin/ccache clang+" \
        HOSTCC="/usr/bin/ccache clang" \
        HOSTCXX="/usr/bin/ccache clang+" \
        LD="${{ github.workspace }}/kernel/common/ld-wrapper" \
        HOSTLD="${{ github.workspace }}/kernel/common/ld-wrapper"
      else
        if [[ ${{ inputs.version }} == "android16-6.12" ]]; then
          if [ "${{ inputs.bypass }}" = "false" ]; then
            sed -i '/name = "kernel_aarch64",/a\    check_defconfig = "disabled",' common/BUILD.bazel
          fi
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --destdir=/home/runner/out
            BUILD_RET=$?
      echo "Bazel returned: $BUILD_RET"

      else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
           BUILD_RET=$?
      echo "Bazel returned: $BUILD_RET"
        fi
      fi

      cat /home/runner/out/kernel_aarch64_dot_config || true
      
      echo "===== BUILD FINISHED ====="
      echo "Build exit code: $BUILD_RET"
      ls -lah /home/runner/out
      
  - name: 'Gather Build Artifacts'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail

      OUT="/home/runner/out"

      echo "Files in $OUT:"
      find "$OUT" -maxdepth 1 -type f

      if [ -f "$OUT/Image" ]; then
        echo "Found Image"
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "$OUT/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "$OUT/Image" "${{ github.workspace }}/AnyKernel3/Image"
          echo "Kernel Version:"
          strings "$OUT/Image" | grep -m1 "^Linux version " || true
        fi
      fi

      [ -f "$OUT/boot.img" ] && cp "$OUT/boot.img" "${{ github.workspace }}/boot.img"
      [ -f "$OUT/vmlinux" ] && cp "$OUT/vmlinux" "${{ github.workspace }}/vmlinux"
      [ -f "$OUT/System.map" ] && cp "$OUT/System.map" "${{ github.workspace }}/System.map"
      [ -f "$OUT/kernel_aarch64_Module.symvers" ] && cp "$OUT/kernel_aarch64_Module.symvers" "${{ github.workspace }}/Module.symvers"
      [ -f "$OUT/kernel_aarch64_dot_config" ] && cp "$OUT/kernel_aarch64_dot_config" "${{ github.workspace }}/.config"

      ls -lh "${{ github.workspace }}"
  - name: Debug Build Output
    if: always()
    shell: bash
    run: |
      mkdir -p /tmp/kernel-debug
      echo "===== OUT =====" > /tmp/kernel-debug/files.txt
      find /home/runner/out -type f 2>/dev/null | sort >> /tmp/kernel-debug/files.txt
      echo "" >> /tmp/kernel-debug/files.txt
      echo "===== DIST =====" >> /tmp/kernel-debug/files.txt
      find /home/runner/out/dist -type f 2>/dev/null | sort >> /tmp/kernel-debug/files.txt

  - name: Upload Debug Output
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: Kernel-Debug
      path: /tmp/kernel-debug
      
  - name: Upload Kernel Files
    if: always()
    uses: actions/upload-artifact@v4
    with:
     name: Kernel-Files
     path: |
        boot.img
        vmlinux
        Module.symvers
        System.map
        .config
        AnyKernel3/Image
      
  - name: 'Patch AnyKernel3 for Bypass Hack'
    shell: bash
    if: ${{ inputs.bypass == 'true' }}
    working-directory: ${{ github.workspace }}/AnyKernel3
    run: |
      set -euo pipefail
      cp ${{ github.action_path }}/patches/bypass.patch "${{ github.workspace }}/AnyKernel3/bypass.patch"
      patch -p1 < bypass.patch

